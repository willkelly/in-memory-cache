<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img"><title>Skew speedup at 8 cores</title><desc>Latency ratio of uniform to Zipfian access at 8 cores per implementation; above 1 means skew helps, below 1 means skew hurts.</desc><text x="20" y="26" font-size="15" font-weight="500" fill="#2C2C2A">effect of skew &#8212; uniform &#247; zipf latency at 8 cores</text><text x="20" y="44" font-size="12" fill="#5F5E5A">above 1.0&#215; = faster under skew (cache locality); below = slower (hot-key contention)</text><rect x="20.0" y="54" width="11" height="11" rx="2" fill="#1D9E75"/><text x="36.0" y="63" font-size="12" fill="#2C2C2A">read-only</text><rect x="125.5" y="54" width="11" height="11" rx="2" fill="#BA7517"/><text x="141.5" y="63" font-size="12" fill="#2C2C2A">balanced</text><line x1="54.0" y1="390.0" x2="704.0" y2="390.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="48.0" y="393.0" font-size="10" fill="#5F5E5A" text-anchor="end">0.0&#215;</text><line x1="54.0" y1="311.5" x2="704.0" y2="311.5" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="48.0" y="314.5" font-size="10" fill="#5F5E5A" text-anchor="end">0.5&#215;</text><line x1="54.0" y1="233.0" x2="704.0" y2="233.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="48.0" y="236.0" font-size="10" fill="#5F5E5A" text-anchor="end">1.0&#215;</text><line x1="54.0" y1="154.5" x2="704.0" y2="154.5" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="48.0" y="157.5" font-size="10" fill="#5F5E5A" text-anchor="end">1.5&#215;</text><line x1="54.0" y1="76.0" x2="704.0" y2="76.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="48.0" y="79.0" font-size="10" fill="#5F5E5A" text-anchor="end">2.0&#215;</text><line x1="54.0" y1="233.0" x2="704.0" y2="233.0" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5,3"/><text x="119.0" y="410.0" font-size="12" fill="#2C2C2A" text-anchor="middle">mutex</text><rect x="82.6" y="141.3" width="36.4" height="248.7" rx="2" fill="#1D9E75"/><text x="100.8" y="137.3" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.58</text><rect x="123.0" y="153.4" width="36.4" height="236.6" rx="2" fill="#BA7517"/><text x="141.2" y="149.4" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.51</text><text x="249.0" y="410.0" font-size="12" fill="#2C2C2A" text-anchor="middle">rwmutex</text><rect x="212.6" y="221.5" width="36.4" height="168.5" rx="2" fill="#1D9E75"/><text x="230.8" y="217.5" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.07</text><rect x="253.0" y="147.5" width="36.4" height="242.5" rx="2" fill="#BA7517"/><text x="271.2" y="143.5" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.54</text><text x="379.0" y="410.0" font-size="12" fill="#2C2C2A" text-anchor="middle">syncmap</text><rect x="342.6" y="93.5" width="36.4" height="296.5" rx="2" fill="#1D9E75"/><text x="360.8" y="89.5" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.89</text><rect x="383.0" y="194.2" width="36.4" height="195.8" rx="2" fill="#BA7517"/><text x="401.2" y="190.2" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.25</text><text x="509.0" y="410.0" font-size="12" fill="#2C2C2A" text-anchor="middle">sharded</text><rect x="472.6" y="199.6" width="36.4" height="190.4" rx="2" fill="#1D9E75"/><text x="490.8" y="195.6" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.21</text><rect x="513.0" y="261.1" width="36.4" height="128.9" rx="2" fill="#BA7517"/><text x="531.2" y="257.1" font-size="9.5" fill="#5F5E5A" text-anchor="middle">0.82</text><text x="639.0" y="410.0" font-size="12" fill="#2C2C2A" text-anchor="middle">cow</text><rect x="602.6" y="144.3" width="36.4" height="245.7" rx="2" fill="#1D9E75"/><text x="620.8" y="140.3" font-size="9.5" fill="#5F5E5A" text-anchor="middle">1.57</text><rect x="643.0" y="228.2" width="36.4" height="161.8" rx="2" fill="#BA7517"/><text x="661.2" y="224.2" font-size="9.5" fill="#5F5E